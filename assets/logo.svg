<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 120" fill="none">
  <defs>
    <linearGradient id="cursor-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- terminal frame -->
  <rect x="16" y="20" width="528" height="80" rx="10"
        fill="#0f172a" stroke="#334155" stroke-width="1.5"/>

  <!-- traffic-light dots, top-left of the terminal -->
  <circle cx="32" cy="34" r="4" fill="#ef4444"/>
  <circle cx="44" cy="34" r="4" fill="#fbbf24"/>
  <circle cx="56" cy="34" r="4" fill="#10b981"/>

  <!-- prompt + command -->
  <text x="32" y="78" font-family="ui-monospace, 'Cascadia Code', 'Fira Code', monospace"
        font-size="32" font-weight="600" letter-spacing="-0.5">
    <tspan fill="#10b981">$</tspan><tspan fill="#94a3b8" dx="6"> </tspan><tspan fill="#e2e8f0">guix-install</tspan>
  </text>

  <!-- blinking cursor block -->
  <rect x="296" y="56" width="14" height="28" fill="url(#cursor-grad)" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.1;0.95" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- mode dots in bottom-right of the terminal, subtle reference -->
  <circle cx="496" cy="84" r="3" fill="#fbbf24"/>
  <circle cx="508" cy="84" r="3" fill="#60a5fa"/>
  <circle cx="520" cy="84" r="3" fill="#a78bfa"/>
  <circle cx="532" cy="84" r="3" fill="#6ee7b7"/>
</svg>
